kind = "web"
previewPath = "/"
title = "VibeGlobally Virtual Assistance"
version = "1.0.0"
id = "artifacts/vibeglobally"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19125

[services.development]
run = "pnpm --filter @workspace/vibeglobally run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibeglobally", "run", "build" ]
publicDir = "artifacts/vibeglobally/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19125"
BASE_PATH = "/"
